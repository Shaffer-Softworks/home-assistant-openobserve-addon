name: Validate

on: [workflow_dispatch, push, pull_request]

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate add-on repository structure
        run: |
          test -f repository.yaml
          test -d openobserve_log_shipper
          test -f openobserve_log_shipper/config.yaml
          test -f openobserve_log_shipper/Dockerfile
          test -f openobserve_log_shipper/build.yaml
